services:
  - type: web
    name: clipping
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: bash start_render.sh
    healthCheckPath: /login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: LANGUAGE_CODE
        value: pt-br
      - key: TIME_ZONE
        value: America/Sao_Paulo
      - key: Q_CLUSTER_WORKERS
        value: "1"
      - key: Q_CLUSTER_TIMEOUT
        value: "1800"
      - key: Q_CLUSTER_RETRY
        value: "1860"
      - key: NEWSAPI_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: YOUTUBE_MAX_QUERIES
        value: "2"
      - key: GOOGLE_RSS_ESSENTIAL_SOURCE_QUERIES
        value: "24"
      - key: GDELT_ENABLED
        value: "true"
      - key: GDELT_MAX_QUERIES
        value: "1"
      - key: GDELT_MAX_RECORDS
        value: "50"
      - key: GDELT_MIN_INTERVAL_SECONDS
        value: "20"
      - key: GDELT_RATE_LIMIT_SLEEP_SECONDS
        value: "30"
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: BRAVE_SEARCH_MAX_QUERIES
        value: "12"
      - key: BRAVE_SEARCH_RESULTS_PER_QUERY
        value: "20"
      - key: DISCOVERY_PROFILE_NEW_SOURCES
        value: "5"
      - key: DISCOVERY_MIN_INTERVAL_HOURS
        value: "24"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
