databases:
  - name: clipping-app-db
    plan: basic-256mb

services:
  - type: web
    name: clipping-app-web
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --timeout 300
    healthCheckPath: /login/
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: clipping-app-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: LANGUAGE_CODE
        value: pt-br
      - key: TIME_ZONE
        value: America/Sao_Paulo
      - key: NEWSAPI_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DJANGO_SUPERUSER_USERNAME
        sync: false
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false

  - type: worker
    name: clipping-app-worker
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py qcluster
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        fromService:
          type: web
          name: clipping-app-web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: clipping-app-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: LANGUAGE_CODE
        value: pt-br
      - key: TIME_ZONE
        value: America/Sao_Paulo
      - key: NEWSAPI_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false

  - type: cron
    name: clipping-app-fetch-news
    runtime: python
    plan: starter
    schedule: "0 */6 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py fetch_news
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: SECRET_KEY
        fromService:
          type: web
          name: clipping-app-web
          envVarKey: SECRET_KEY
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: clipping-app-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: LANGUAGE_CODE
        value: pt-br
      - key: TIME_ZONE
        value: America/Sao_Paulo
      - key: NEWSAPI_API_KEY
        sync: false
      - key: NEWSDATA_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CSE_ID
        sync: false
