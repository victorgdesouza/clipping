{% extends "base.html" %}
{% block title %}E-mail Enviado{% endblock %}

{% block content %}
<section class="auth-shell">
  <div class="auth-panel">
    <p class="page-eyebrow">Senha</p>
    <h1>Confira seu e-mail</h1>
    <p class="auth-subtitle">Se o endereco estiver cadastrado, voce recebera um link para criar uma nova senha.</p>
    <a href="{% url 'login' %}" class="button button-full">Voltar para o login</a>
  </div>
</section>
{% endblock %}
